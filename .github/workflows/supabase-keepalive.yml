name: Supabase Keep-Alive

on:
  schedule:
    # Run every 3 days at midnight UTC
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --fail-with-body

      - name: Log success
        if: success()
        run: echo "✅ Successfully pinged Supabase at $(date)"

      - name: Log failure
        if: failure()
        run: echo "❌ Failed to ping Supabase at $(date)"
